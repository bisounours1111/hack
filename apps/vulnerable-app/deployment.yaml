apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-app
  namespace: demo
  labels:
    app: vulnerable-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vulnerable-app
  template:
    metadata:
      labels:
        app: vulnerable-app
    spec:
      containers:
        - name: nginx
          image: nginx:1.14
          ports:
            - containerPort: 80
          securityContext:
            privileged: true
          resources: {}
