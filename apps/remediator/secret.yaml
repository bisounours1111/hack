# Template — ne pas committer de secrets réels.
# Créer le secret manuellement :
#
# kubectl create secret generic remediator-secrets -n demo \
#   --from-literal=OVH_AI_BASE_URL=https://oai.endpoints.kepler.ai.cloud.ovh.net/v1 \
#   --from-literal=OVH_AI_TOKEN=<token> \
#   --from-literal=OVH_AI_MODEL=Meta-Llama-3_3-70B-Instruct \
#   --from-literal=GITHUB_TOKEN=<pat> \
#   --from-literal=GITHUB_REPO=bisounours1111/hack
#
apiVersion: v1
kind: Secret
metadata:
  name: remediator-secrets
  namespace: demo
type: Opaque
stringData:
  OVH_AI_BASE_URL: "https://oai.endpoints.kepler.ai.cloud.ovh.net/v1"
  OVH_AI_TOKEN: "REPLACE_ME"
  OVH_AI_MODEL: "Meta-Llama-3_3-70B-Instruct"
  GITHUB_TOKEN: "REPLACE_ME"
  GITHUB_REPO: "bisounours1111/hack"
