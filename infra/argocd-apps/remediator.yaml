apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: remediator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/bisounours1111/hack
    targetRevision: main
    path: apps/remediator
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
